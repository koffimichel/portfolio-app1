name: My first pipeline

on: push

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Build image 
              run: |
                docker build -t ${{secrets.DOCKER_USERNAME}}/ciportfolio:${{github.run_number}} .
                docker build -t ${{secrets.DOCKER_USERNAME}}/ciportfolio .
            - name: Docker Login
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Push image to Registry
              run: |
                docker push ${{secrets.DOCKER_USERNAME}}/ciportfolio:${{github.run_number}}
                docker push ${{secrets.DOCKER_USERNAME}}/ciportfolio
    deploy:
      needs: build
      runs-on: ubuntu-latest
      steps:
        - name: SSH to Linux and container
          uses: appleboy/ssh-action@v1
          with:
            host: ${{ secrets.HOST }}
            username: ${{ secrets.SSH_USERNAME }}
            key: ${{ secrets.PRIVATE_KEY}}
           # port: ${{ secrets.PORT }}
            script: |
                docker rm -f portfolio || echo "Container not found, skipping removal"
                docker run -d --name portfolio -p 8080:80 ${{secrets.DOCKER_USERNAME}}/ciportfolio:${{github.run_number}}
                    
                    
    